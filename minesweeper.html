<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지뢰찾기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      letter-spacing: 2px;
      color: #e94560;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: transform 0.1s, opacity 0.1s;
    }

    .controls button:active { transform: scale(0.96); }

    .btn-easy   { background: #4ade80; color: #111; }
    .btn-medium { background: #facc15; color: #111; }
    .btn-hard   { background: #f87171; color: #111; }
    .btn-reset  { background: #60a5fa; color: #111; }

    .status-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 12px;
      font-size: 1.1rem;
      background: #16213e;
      padding: 10px 24px;
      border-radius: 10px;
    }

    .status-bar span { display: flex; align-items: center; gap: 6px; }

    #board {
      display: inline-grid;
      gap: 3px;
      background: #16213e;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 8px 32px #0008;
    }

    .cell {
      width: 36px;
      height: 36px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, transform 0.08s;
      user-select: none;
    }

    .cell.hidden {
      background: #0f3460;
      box-shadow: inset 0 -3px 0 #061a3a;
    }

    .cell.hidden:hover { background: #1a4a80; transform: scale(1.05); }

    .cell.revealed {
      background: #1a1a2e;
      box-shadow: none;
      cursor: default;
    }

    .cell.flagged {
      background: #0f3460;
      box-shadow: inset 0 -3px 0 #061a3a;
    }

    .cell.mine-hit  { background: #e94560; }
    .cell.mine-show { background: #2d1f2e; }

    .n1 { color: #60a5fa; }
    .n2 { color: #4ade80; }
    .n3 { color: #f87171; }
    .n4 { color: #a78bfa; }
    .n5 { color: #fb923c; }
    .n6 { color: #22d3ee; }
    .n7 { color: #f472b6; }
    .n8 { color: #e2e8f0; }

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0009;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #overlay.show { display: flex; }

    .overlay-box {
      background: #16213e;
      border-radius: 16px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 0 16px 48px #000a;
    }

    .overlay-box h2 { font-size: 2.2rem; margin-bottom: 10px; }
    .overlay-box p  { font-size: 1rem; color: #aaa; margin-bottom: 24px; }

    .overlay-box button {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .overlay-box button:hover { opacity: 0.85; }
  </style>
</head>
<style>
  .home-btn {
    position: fixed; top: 16px; left: 20px;
    color: #94a3b8; text-decoration: none;
    font-size: .88rem; font-weight: 600;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    padding: 7px 14px; border-radius: 8px;
    transition: color .15s, background .15s;
    z-index: 50;
  }
  .home-btn:hover { color: #e2e8f0; background: rgba(255,255,255,.1); }
</style>
<body>

<a href="index.html" class="home-btn">← 홈</a>
<h1>💣 지뢰찾기</h1>

<div class="controls">
  <button class="btn-easy"   onclick="startGame(9,9,10)">쉬움 (9×9)</button>
  <button class="btn-medium" onclick="startGame(16,16,40)">보통 (16×16)</button>
  <button class="btn-hard"   onclick="startGame(16,30,99)">어려움 (16×30)</button>
  <button class="btn-reset"  onclick="resetGame()">↺ 재시작</button>
</div>

<div class="status-bar">
  <span>💣 <span id="mine-count">0</span></span>
  <span>⏱ <span id="timer">0</span>s</span>
  <span>🚩 <span id="flag-count">0</span></span>
</div>

<div id="board"></div>

<div id="overlay">
  <div class="overlay-box">
    <h2 id="overlay-title"></h2>
    <p  id="overlay-msg"></p>
    <button onclick="resetGame()">다시 하기</button>
  </div>
</div>

<script>
  let rows, cols, totalMines;
  let board, revealed, flagged, minePos;
  let gameOver, firstClick, timerInterval, elapsed, flagCount;

  function startGame(r, c, m) {
    rows = r; cols = c; totalMines = m;
    resetGame();
  }

  function resetGame() {
    clearInterval(timerInterval);
    elapsed = 0;
    flagCount = 0;
    gameOver = false;
    firstClick = true;

    board    = Array.from({length: rows}, () => Array(cols).fill(0));
    revealed = Array.from({length: rows}, () => Array(cols).fill(false));
    flagged  = Array.from({length: rows}, () => Array(cols).fill(false));
    minePos  = new Set();

    document.getElementById('timer').textContent = '0';
    document.getElementById('mine-count').textContent = totalMines;
    document.getElementById('flag-count').textContent = '0';
    document.getElementById('overlay').classList.remove('show');

    renderBoard();
  }

  function placeMines(safeR, safeC) {
    const safe = new Set();
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        const nr = safeR + dr, nc = safeC + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols)
          safe.add(nr * cols + nc);
      }

    while (minePos.size < totalMines) {
      const idx = Math.floor(Math.random() * rows * cols);
      if (!safe.has(idx)) minePos.add(idx);
    }

    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        board[r][c] = minePos.has(r * cols + c) ? -1 : 0;

    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        if (board[r][c] === -1) continue;
        let cnt = 0;
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) cnt++;
          }
        board[r][c] = cnt;
      }
  }

  function renderBoard() {
    const el = document.getElementById('board');
    el.style.gridTemplateColumns = `repeat(${cols}, 36px)`;
    el.innerHTML = '';

    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell hidden';
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.addEventListener('click', onLeftClick);
        cell.addEventListener('contextmenu', onRightClick);
        el.appendChild(cell);
      }
  }

  function getCell(r, c) {
    return document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  }

  function onLeftClick(e) {
    if (gameOver) return;
    const r = +this.dataset.r, c = +this.dataset.c;
    if (flagged[r][c] || revealed[r][c]) return;

    if (firstClick) {
      firstClick = false;
      placeMines(r, c);
      timerInterval = setInterval(() => {
        elapsed++;
        document.getElementById('timer').textContent = elapsed;
      }, 1000);
    }

    if (board[r][c] === -1) {
      revealAllMines(r, c);
      endGame(false);
      return;
    }

    flood(r, c);
    updateCells();
    checkWin();
  }

  function onRightClick(e) {
    e.preventDefault();
    if (gameOver) return;
    const r = +this.dataset.r, c = +this.dataset.c;
    if (revealed[r][c]) return;

    flagged[r][c] = !flagged[r][c];
    flagCount += flagged[r][c] ? 1 : -1;
    document.getElementById('flag-count').textContent = flagCount;

    const cell = getCell(r, c);
    if (flagged[r][c]) {
      cell.classList.add('flagged');
      cell.textContent = '🚩';
    } else {
      cell.classList.remove('flagged');
      cell.textContent = '';
    }
  }

  function flood(r, c) {
    if (r < 0 || r >= rows || c < 0 || c >= cols) return;
    if (revealed[r][c] || flagged[r][c]) return;
    revealed[r][c] = true;
    if (board[r][c] === 0)
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++)
          if (dr !== 0 || dc !== 0) flood(r + dr, c + dc);
  }

  function updateCells() {
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        if (!revealed[r][c]) continue;
        const cell = getCell(r, c);
        cell.classList.remove('hidden');
        cell.classList.add('revealed');
        const v = board[r][c];
        if (v > 0) { cell.textContent = v; cell.classList.add(`n${v}`); }
      }
  }

  function revealAllMines(hitR, hitC) {
    minePos.forEach(idx => {
      const r = Math.floor(idx / cols), c = idx % cols;
      const cell = getCell(r, c);
      cell.classList.remove('hidden', 'flagged');
      if (r === hitR && c === hitC) {
        cell.classList.add('mine-hit');
      } else {
        cell.classList.add('mine-show');
      }
      cell.textContent = '💣';
    });
  }

  function checkWin() {
    let unrevealedSafe = 0;
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (!revealed[r][c] && board[r][c] !== -1) unrevealedSafe++;
    if (unrevealedSafe === 0) endGame(true);
  }

  function endGame(win) {
    gameOver = true;
    clearInterval(timerInterval);
    const overlay = document.getElementById('overlay');
    document.getElementById('overlay-title').textContent = win ? '🎉 승리!' : '💥 게임 오버';
    document.getElementById('overlay-msg').textContent = win
      ? `${elapsed}초 만에 클리어했습니다!`
      : '지뢰를 밟았습니다. 다시 도전해보세요!';
    overlay.classList.add('show');
  }

  // 기본 보통 난이도로 시작
  startGame(16, 16, 40);
</script>
</body>
</html>
